name: Sync Public Repositories

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/sync_public_repos.py
      - name: Commit repository updates
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "loucify-profile-bot"
          git config user.email "loucify-profile-bot@users.noreply.github.com"
          git add README.md assets/loucify-console-v3.svg
          git commit -m "chore: sync public repositories"
          git push
