<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1150" width="100%">
  <defs>
    <style>
      @keyframes blink { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
      @keyframes pulse { 0%,100% { opacity:0.12; } 50% { opacity:0.25; } }

      .cb { animation: blink 1s step-end infinite; }
      .tg {
        background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,255,65,0.01) 80%, rgba(0,255,65,0.005) 100%);
        animation: pulse 6s ease-in-out infinite;
      }
      .sl {
        background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(0,255,65,0.008) 2px, rgba(0,255,65,0.008) 4px);
      }
      @media (prefers-reduced-motion: reduce) {
        .cb, .tg { animation: none !important; }
        .sl { display: none; }
      }
    </style>
  </defs>

  <!-- Dark background -->
  <rect width="880" height="1150" fill="#080808"/>

  <!-- Terminal window -->
  <rect x="0" y="0" width="880" height="1150" rx="6" fill="#0d0d0d" stroke="#1a1f1a" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="880" height="36" rx="6" fill="#121212"/>
  <rect x="0" y="30" width="880" height="6" fill="#121212"/>
  <circle cx="20" cy="18" r="5.5" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="5.5" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="5.5" fill="#28c840"/>
  <text x="440" y="23" text-anchor="middle" fill="#505050" font-family="'SF Mono','Consolas','Courier New',monospace" font-size="12">visitor@github — ssh — 88×32</text>

  <!-- Terminal body -->
  <rect x="0" y="36" width="880" height="1114" fill="#0d0d0d"/>

  <!-- ===== CONTENT ===== -->
  <g font-family="'SF Mono','Consolas','Courier New',monospace" font-size="14">

    <!-- Login banner -->
    <text x="24" y="64" fill="#555">Last login: Wed Jul 16 14:22:01 UTC 2026 from 198.51.100.1</text>

    <!-- Command 1: ssh -->
    <text x="24" y="92" fill="#00ff41">visitor@github:~$ ssh loucify@github</text>

    <!-- SSH response -->
    <text x="24" y="116" fill="#666">The authenticity of host &apos;github.com (140.82.121.4)&apos; can&apos;t be established.</text>
    <text x="24" y="140" fill="#666">ED25519 key fingerprint is SHA256:+DiY3wvvV6TuJJhbpZisF/lLDA0zPMSvHdkr4UvCOqU.</text>
    <text x="24" y="164" fill="#666">This key is not known by any other names.</text>
    <text x="24" y="188" fill="#666">Are you sure you want to continue connecting? Yes</text>
    <text x="24" y="212" fill="#666">Warning: Permanently added &apos;github.com&apos; (ED25519) to the list of known hosts.</text>
    <text x="24" y="240" fill="#00ff41">  Verified. Connection established — 14:22:01 UTC</text>

    <!-- ===== PORTRAIT + WHOAMI SIDE BY SIDE ===== -->

    <!-- Command 2: whoami -->
    <text x="24" y="276" fill="#00ff41">visitor@github:~$ whoami</text>
    <text x="24" y="300" fill="#aaa">  → Lamine Heskoura</text>
    <text x="24" y="324" fill="#aaa">  → Developer from Algeria</text>
    <text x="24" y="348" fill="#aaa">  → Curiosity-driven engineer</text>

    <!-- ASCII Portrait (right side) -->
    <g font-size="11" fill="#00ff41" opacity="0.85">
      <text x="510" y="266">        @@@@@@@@@@@@@@@@@@@@</text>
      <text x="510" y="283">      @@@@@@@@@@@@@@@@@@@@@@@@@</text>
      <text x="510" y="300">    @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@</text>
      <text x="510" y="317">   @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@</text>
      <text x="510" y="334">  @@@@@@@@@@@   O      O   @@@@@@@@@@@</text>
      <text x="510" y="351"> @@@@@@@@@@@@   O      O   @@@@@@@@@@@@@</text>
      <text x="510" y="368"> @@@@@@@@@@@@   O      O   @@@@@@@@@@@@@</text>
      <text x="510" y="385">  @@@@@@@@@@@            @@@@@@@@@@@@</text>
      <text x="510" y="402">  @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@</text>
      <text x="510" y="419">   @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@</text>
      <text x="510" y="436">    @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@</text>
      <text x="510" y="453">      @@@@@@@@@@   @@@@@@@@@@@@@@</text>
      <text x="510" y="470">       @@@@@@@@    @@@@@@@@@@@@</text>
      <text x="510" y="487">        @@@@@@     @@@@@@@@@@</text>
      <text x="510" y="504">         @@@@      @@@@@@@@</text>
    </g>

    <!-- Command 3: ls -->
    <text x="24" y="380" fill="#00ff41">visitor@github:~$ ls</text>
    <text x="24" y="404" fill="#aaa">
      <tspan fill="#00ff41">Applications/</tspan>   <tspan fill="#00ff41">Scripts/</tspan>        <tspan fill="#00ff41">Utilities/</tspan>
    </text>
    <text x="24" y="428" fill="#aaa">
      <tspan fill="#00ff41">Websites/</tspan>       philosophy.txt  stack.txt
    </text>

    <!-- Command 4: philosophy -->
    <text x="24" y="464" fill="#00ff41">visitor@github:~$ cat philosophy.txt</text>
    <text x="24" y="488" fill="#aaa">  &quot;If a tool doesn&apos;t exist, I build it.&quot;</text>
    <text x="24" y="512" fill="#aaa">  &quot;Simplicity is the ultimate sophistication.&quot;</text>

    <!-- Command 5: projects -->
    <text x="24" y="548" fill="#00ff41">visitor@github:~$ ./projects --list</text>
    <text x="24" y="572" fill="#aaa">  <tspan fill="#00ff41">[web]</tspan>    Apps &amp; Websites    → Full-stack development</text>
    <text x="24" y="596" fill="#aaa">  <tspan fill="#00ff41">[app]</tspan>    Automation Tools   → Scripting &amp; pipelines</text>
    <text x="24" y="620" fill="#aaa">  <tspan fill="#00ff41">[tool]</tspan>   Developer Utilities → CLI tools &amp; plugins</text>
    <text x="24" y="644" fill="#aaa">  <tspan fill="#00ff41">[script]</tspan>  Data Scripts       → Analysis &amp; processing</text>

    <!-- Command 6: stack -->
    <text x="24" y="680" fill="#00ff41">visitor@github:~$ cat stack.txt</text>
    <text x="24" y="704" fill="#aaa">  <tspan fill="#888">Languages:</tspan>   Python · JavaScript · TypeScript · Go · Bash</text>
    <text x="24" y="728" fill="#aaa">  <tspan fill="#888">Frontend:</tspan>    React · Vue · Tailwind CSS · HTML/CSS</text>
    <text x="24" y="752" fill="#aaa">  <tspan fill="#888">Backend:</tspan>     Node.js · FastAPI · PostgreSQL · Redis</text>
    <text x="24" y="776" fill="#aaa">  <tspan fill="#888">Tools:</tspan>       Git · Docker · Linux · Neovim · Figma</text>

    <!-- Command 7: contact -->
    <text x="24" y="812" fill="#00ff41">visitor@github:~$ ./contact</text>
    <text x="24" y="836" fill="#aaa">  <tspan fill="#888">Email:</tspan>    → lamineheskoura@icloud.com</text>
    <text x="24" y="860" fill="#aaa">  <tspan fill="#888">GitHub:</tspan>   → github.com/lamineheskoura</text>
    <text x="24" y="884" fill="#aaa">  <tspan fill="#888">Location:</tspan> → Algeria</text>

    <!-- Command 8: exit -->
    <text x="24" y="920" fill="#00ff41">visitor@github:~$ exit</text>
    <text x="24" y="944" fill="#666">  logout</text>

    <!-- Connection closed -->
    <text x="24" y="976" fill="#555">  +--------------------------------------+</text>
    <text x="24" y="1000" fill="#555">  |  Connection closed.                   |</text>
    <text x="24" y="1024" fill="#555">  +--------------------------------------+</text>

    <!-- Blinking cursor -->
    <text x="24" y="1060" fill="#00ff41" class="cb">  █</text>

  </g>

  <!-- Scan line overlay -->
  <rect x="0" y="36" width="880" height="1114" class="sl" pointer-events="none"/>

  <!-- Terminal glow -->
  <rect x="0" y="36" width="880" height="1114" class="tg" pointer-events="none"/>
</svg>
