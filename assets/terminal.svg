<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1100" width="100%">
  <defs>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes glowPulse {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.28; }
      }
      @keyframes r1 {
        from { width: 380px; }
        to { width: 0; }
      }
      @keyframes r2 {
        from { width: 220px; }
        to { width: 0; }
      }
      @keyframes r3 {
        from { width: 180px; }
        to { width: 0; }
      }
      @keyframes r4 {
        from { width: 340px; }
        to { width: 0; }
      }
      @keyframes r5 {
        from { width: 320px; }
        to { width: 0; }
      }
      @keyframes r6 {
        from { width: 290px; }
        to { width: 0; }
      }
      @keyframes r7 {
        from { width: 250px; }
        to { width: 0; }
      }
      @keyframes r8 {
        from { width: 210px; }
        to { width: 0; }
      }

      .tf { animation: fadeIn 0.6s ease 0.3s both; }
      .lf { animation: fadeIn 0.5s ease both; opacity: 0; }
      .pl { animation: fadeIn 0.7s ease both; opacity: 0; }

      .d1 { animation-delay: 1.2s; }
      .d2 { animation-delay: 1.5s; }
      .d3 { animation-delay: 1.8s; }
      .d4 { animation-delay: 2.1s; }
      .d5 { animation-delay: 2.4s; }

      .cv1 { animation: r1 2.5s steps(40) 1.5s forwards; }
      .cv2 { animation: r2 1.2s steps(23) 6.2s forwards; }
      .cv3 { animation: r3 0.8s steps(19) 9.0s forwards; }
      .cv4 { animation: r4 1.8s steps(37) 11.5s forwards; }
      .cv5 { animation: r5 1.6s steps(34) 14.8s forwards; }
      .cv6 { animation: r6 1.3s steps(31) 18.2s forwards; }
      .cv7 { animation: r7 1.1s steps(26) 21.2s forwards; }
      .cv8 { animation: r8 0.8s steps(22) 23.8s forwards; }

      .oa1 { animation-delay: 4.2s; }
      .oa2 { animation-delay: 4.5s; }
      .oa3 { animation-delay: 4.8s; }
      .oa4 { animation-delay: 5.1s; }
      .oa5 { animation-delay: 5.4s; }
      .oa6 { animation-delay: 5.7s; }

      .ob1 { animation-delay: 7.6s; }
      .ob2 { animation-delay: 7.9s; }
      .ob3 { animation-delay: 8.2s; }

      .oc1 { animation-delay: 10.0s; }
      .oc2 { animation-delay: 10.3s; }

      .od1 { animation-delay: 13.6s; }
      .od2 { animation-delay: 13.9s; }

      .oe1 { animation-delay: 16.6s; }
      .oe2 { animation-delay: 16.9s; }
      .oe3 { animation-delay: 17.2s; }
      .oe4 { animation-delay: 17.5s; }

      .of1 { animation-delay: 19.7s; }
      .of2 { animation-delay: 20.0s; }
      .of3 { animation-delay: 20.3s; }
      .of4 { animation-delay: 20.6s; }

      .og1 { animation-delay: 22.5s; }
      .og2 { animation-delay: 22.8s; }
      .og3 { animation-delay: 23.1s; }

      .oh1 { animation-delay: 24.8s; }
      .oh2 { animation-delay: 25.1s; }
      .oh3 { animation-delay: 25.4s; }
      .oh4 { animation-delay: 25.7s; }

      .pt1 { animation-delay: 6.8s; }
      .pt2 { animation-delay: 6.9s; }
      .pt3 { animation-delay: 7.0s; }
      .pt4 { animation-delay: 7.1s; }
      .pt5 { animation-delay: 7.2s; }
      .pt6 { animation-delay: 7.3s; }
      .pt7 { animation-delay: 7.4s; }
      .pt8 { animation-delay: 7.5s; }
      .pt9 { animation-delay: 7.6s; }
      .pt10 { animation-delay: 7.7s; }
      .pt11 { animation-delay: 7.8s; }
      .pt12 { animation-delay: 7.9s; }
      .pt13 { animation-delay: 8.0s; }
      .pt14 { animation-delay: 8.1s; }
      .pt15 { animation-delay: 8.2s; }

      .cf {
        opacity: 0;
        animation: blink 1s step-end 27s infinite;
      }

      .sl {
        background: repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 2px,
          rgba(0, 255, 65, 0.01) 2px,
          rgba(0, 255, 65, 0.01) 4px
        );
      }

      .tg {
        background: radial-gradient(
          ellipse at 50% 50%,
          transparent 50%,
          rgba(0, 255, 65, 0.012) 80%,
          rgba(0, 255, 65, 0.006) 100%
        );
        animation: glowPulse 6s ease-in-out 1s infinite;
      }

      @media (prefers-reduced-motion: reduce) {
        .tf, .lf, .pl, .cv1, .cv2, .cv3, .cv4, .cv5, .cv6, .cv7, .cv8,
        .cf, .tg { animation: none !important; opacity: 1 !important; }
        .sl { display: none; }
      }
    </style>
  </defs>

  <!-- Background canvas -->
  <rect width="880" height="1100" fill="#0a0a0a"/>

  <!-- Terminal window frame -->
  <rect x="0" y="0" width="880" height="1100" rx="6" ry="6" fill="#0d0d0d" stroke="#1a1f1a" stroke-width="1" class="tf"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="880" height="36" rx="6" ry="6" fill="#131313"/>
  <rect x="0" y="30" width="880" height="6" fill="#131313"/>

  <!-- Window controls -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>

  <!-- Window title -->
  <text x="440" y="23" text-anchor="middle" fill="#505050" font-family="'SF Mono','Consolas','Courier New',monospace" font-size="12" class="tf">visitor@github — ssh — 88×24</text>

  <!-- Terminal body -->
  <rect x="0" y="36" width="880" height="1064" fill="#0d0d0d"/>

  <!-- ===== TERMINAL SESSION ===== -->
  <g font-family="'SF Mono','Consolas','Courier New',monospace" font-size="14">

    <!-- Login banner -->
    <text x="24" y="64" fill="#555" class="lf d1">Last login: Wed Jul 16 14:22:01 UTC 2026 from 198.51.100.1</text>
    <text x="24" y="88" fill="#0d0d0d">.</text>

    <!-- Command 1: ssh -->
    <text x="24" y="112" fill="#00ff41" font-weight="bold">visitor@github:~$ ssh loucify@github</text>
    <rect x="24" y="99" width="380" height="18" fill="#0d0d0d" class="cv1"/>

    <!-- SSH response -->
    <text x="24" y="136" fill="#666" class="lf oa1">The authenticity of host &apos;github.com (140.82.121.4)&apos; can&apos;t be established.</text>
    <text x="24" y="160" fill="#666" class="lf oa2">ED25519 key fingerprint is SHA256:+DiY3wvvV6TuJJhbpZisF/lLDA0zPMSvHdkr4UvCOqU.</text>
    <text x="24" y="184" fill="#666" class="lf oa3">This key is not known by any other names.</text>
    <text x="24" y="208" fill="#666" class="lf oa4">Are you sure you want to continue connecting? Yes</text>
    <text x="24" y="232" fill="#666" class="lf oa5">Warning: Permanently added &apos;github.com&apos; (ED25519) to the list of known hosts.</text>
    <text x="24" y="256" fill="#00ff41" class="lf oa6">  Verified. Connection established — 14:22:01 UTC</text>

    <!-- Spacer -->
    <text x="24" y="280" fill="#0d0d0d">.</text>

    <!-- ===== PORTRAIT ===== -->
    <g font-size="11" fill="#00ff41" font-weight="bold" opacity="0.9">
      <text x="500" y="283" class="pl pt1">        @@@@@@@@@@@@@@@@@@@@</text>
      <text x="500" y="300" class="pl pt2">      @@@@@@@@@@@@@@@@@@@@@@@@@</text>
      <text x="500" y="317" class="pl pt3">    @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@</text>
      <text x="500" y="334" class="pl pt4">   @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@</text>
      <text x="500" y="351" class="pl pt5">  @@@@@@@@@@@   O      O   @@@@@@@@@@@</text>
      <text x="500" y="368" class="pl pt6"> @@@@@@@@@@@@   O      O   @@@@@@@@@@@@@</text>
      <text x="500" y="385" class="pl pt7"> @@@@@@@@@@@@   O      O   @@@@@@@@@@@@@</text>
      <text x="500" y="402" class="pl pt8">  @@@@@@@@@@@            @@@@@@@@@@@@</text>
      <text x="500" y="419" class="pl pt9">  @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@</text>
      <text x="500" y="436" class="pl pt10">   @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@</text>
      <text x="500" y="453" class="pl pt11">    @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@</text>
      <text x="500" y="470" class="pl pt12">      @@@@@@@@@@   @@@@@@@@@@@@@@</text>
      <text x="500" y="487" class="pl pt13">       @@@@@@@@    @@@@@@@@@@@@</text>
      <text x="500" y="504" class="pl pt14">        @@@@@@     @@@@@@@@@@</text>
      <text x="500" y="521" class="pl pt15">         @@@@      @@@@@@@@</text>
    </g>

    <!-- Command 2: whoami -->
    <text x="24" y="308" fill="#00ff41" font-weight="bold">visitor@github:~$ whoami</text>
    <rect x="24" y="295" width="220" height="18" fill="#0d0d0d" class="cv2"/>

    <text x="24" y="332" fill="#aaa" class="lf ob1">  → Lamine Heskoura</text>
    <text x="24" y="356" fill="#aaa" class="lf ob2">  → Developer from Algeria</text>
    <text x="24" y="380" fill="#aaa" class="lf ob3">  → Curiosity-driven engineer</text>

    <!-- Command 3: ls -->
    <text x="24" y="412" fill="#00ff41" font-weight="bold">visitor@github:~$ ls</text>
    <rect x="24" y="399" width="180" height="18" fill="#0d0d0d" class="cv3"/>

    <text x="24" y="436" fill="#aaa" class="lf oc1">
      <tspan fill="#00ff41">Applications/</tspan>   <tspan fill="#00ff41">Scripts/</tspan>        <tspan fill="#00ff41">Utilities/</tspan>
    </text>
    <text x="24" y="460" fill="#aaa" class="lf oc2">
      <tspan fill="#00ff41">Websites/</tspan>       philosophy.txt  stack.txt
    </text>

    <!-- Command 4: philosophy -->
    <text x="24" y="492" fill="#00ff41" font-weight="bold">visitor@github:~$ cat philosophy.txt</text>
    <rect x="24" y="479" width="340" height="18" fill="#0d0d0d" class="cv4"/>

    <text x="24" y="516" fill="#aaa" class="lf od1">  &quot;If a tool doesn&apos;t exist, I build it.&quot;</text>
    <text x="24" y="540" fill="#aaa" class="lf od2">  &quot;Simplicity is the ultimate sophistication.&quot;</text>

    <!-- Command 5: projects -->
    <text x="24" y="572" fill="#00ff41" font-weight="bold">visitor@github:~$ ./projects --list</text>
    <rect x="24" y="559" width="320" height="18" fill="#0d0d0d" class="cv5"/>

    <text x="24" y="596" fill="#aaa" class="lf oe1">  <tspan fill="#00ff41">[web]</tspan>    Apps &amp; Websites    → Full-stack development</text>
    <text x="24" y="620" fill="#aaa" class="lf oe2">  <tspan fill="#00ff41">[app]</tspan>    Automation Tools   → Scripting &amp; pipelines</text>
    <text x="24" y="644" fill="#aaa" class="lf oe3">  <tspan fill="#00ff41">[tool]</tspan>   Developer Utilities → CLI tools &amp; plugins</text>
    <text x="24" y="668" fill="#aaa" class="lf oe4">  <tspan fill="#00ff41">[script]</tspan>  Data Scripts       → Analysis &amp; processing</text>

    <!-- Command 6: stack -->
    <text x="24" y="700" fill="#00ff41" font-weight="bold">visitor@github:~$ cat stack.txt</text>
    <rect x="24" y="687" width="290" height="18" fill="#0d0d0d" class="cv6"/>

    <text x="24" y="724" fill="#aaa" class="lf of1">  <tspan fill="#888">Languages:</tspan>   Python · JavaScript · TypeScript · Go · Bash</text>
    <text x="24" y="748" fill="#aaa" class="lf of2">  <tspan fill="#888">Frontend:</tspan>    React · Vue · Tailwind CSS · HTML/CSS</text>
    <text x="24" y="772" fill="#aaa" class="lf of3">  <tspan fill="#888">Backend:</tspan>     Node.js · FastAPI · PostgreSQL · Redis</text>
    <text x="24" y="796" fill="#aaa" class="lf of4">  <tspan fill="#888">Tools:</tspan>       Git · Docker · Linux · Neovim · Figma</text>

    <!-- Command 7: contact -->
    <text x="24" y="828" fill="#00ff41" font-weight="bold">visitor@github:~$ ./contact</text>
    <rect x="24" y="815" width="250" height="18" fill="#0d0d0d" class="cv7"/>

    <text x="24" y="852" fill="#aaa" class="lf og1">  <tspan fill="#888">Email:</tspan>    → lamineheskoura@icloud.com</text>
    <text x="24" y="876" fill="#aaa" class="lf og2">  <tspan fill="#888">GitHub:</tspan>   → github.com/lamineheskoura</text>
    <text x="24" y="900" fill="#aaa" class="lf og3">  <tspan fill="#888">Location:</tspan> → Algeria</text>

    <!-- Command 8: exit -->
    <text x="24" y="932" fill="#00ff41" font-weight="bold">visitor@github:~$ exit</text>
    <rect x="24" y="919" width="210" height="18" fill="#0d0d0d" class="cv8"/>

    <text x="24" y="956" fill="#666" class="lf oh1">  logout</text>

    <!-- Connection closed -->
    <text x="24" y="984" fill="#555" class="lf oh2">  ┌──────────────────────────────────────┐</text>
    <text x="24" y="1008" fill="#555" class="lf oh3">  │  Connection closed.                   │</text>
    <text x="24" y="1032" fill="#555" class="lf oh4">  └──────────────────────────────────────┘</text>

    <!-- Final cursor -->
    <text x="24" y="1068" fill="#00ff41" class="cf">  ▊</text>

  </g>

  <!-- Scan line overlay -->
  <rect x="0" y="36" width="880" height="1064" class="sl" pointer-events="none"/>

  <!-- Terminal glow -->
  <rect x="0" y="36" width="880" height="1064" class="tg" pointer-events="none"/>
</svg>
